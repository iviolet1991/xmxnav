<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网站导航 | Site Navigator</title>
	<link type="text/css" rel="stylesheet" href="css/nav.css"/>
	<script src="js/navdata.js"></script>
	<script src="js/nav.js"></script>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <h1>网站导航</h1>
        <p class="subtitle">快速访问你喜爱的网站</p>
        
        <!-- Bing 搜索表单 -->
        <div class="search-container">
            <form class="search-form" action="https://www.bing.com/search" method="get" target="_blank" onsubmit="return handleBingSearch(this);">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-box" name="q" id="searchInput" placeholder="搜索网站或使用 Bing 搜索..." autocomplete="off">
                <input type="hidden" name="setmkt" value="zh-CN">
                <button type="submit" class="search-btn">→</button>
            </form>
        </div>
        
        <!-- 本地筛选标签 -->
        <div class="filter-tags" id="filterTags">
            <div class="tag active" data-category="all">全部</div>
        </div>
    </header>

    <main id="mainContent">
        <div class="loading">
            <div class="spinner"></div>
            <div>正在加载导航数据...</div>
        </div>
    </main>

    <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔭</div>
        <div>没有找到匹配的网站</div>
    </div>
</body>
</html>
